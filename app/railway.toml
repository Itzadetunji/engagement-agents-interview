# Frontend (Next.js dashboard)
#
# Railway setup:
#   1. Create a service named "App" (or similar).
#   2. Settings → Config file path: /app/railway.toml
#   3. Leave Root Directory empty (repo root) so shared types/ is available.
#   4. Generate a public domain.
#   5. Variables (NEXT_PUBLIC_* must be set before build):
#        NEXT_PUBLIC_API_URL=https://${{Backend.RAILWAY_PUBLIC_DOMAIN}}

[build]
builder = "RAILPACK"
buildCommand = "cd app && bun install --frozen-lockfile && bun run build"
watchPatterns = ["app/**", "types/**"]

[deploy]
startCommand = "cd app && bun run start"
healthcheckPath = "/dashboard"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
