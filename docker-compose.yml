services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      API_PORT: 3001
      DATABASE_PATH: /workspace/backend/data/promotions.db
      SCRAPE_DELAY_MS: 500
      REQUEST_TIMEOUT_MS: 15000
    volumes:
      - type: volume
        source: sqlite_data
        target: /workspace/backend/data

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  sqlite_data:
